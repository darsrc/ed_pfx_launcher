[steam]
prefix_dir=~/.local/share/Steam/steamapps/compatdata
prefix_select=newest

[proton]
dir=~/.local/share/Steam
select=newest

[interactive]
ui=wizard

[instances]
mode=split

[shared_data]
enabled=true
source_prefix=game
strategy=symlink

[edcopilot]
mode=auto
delay=5
bus_wait=30
timeout=45

[perf]
pulse_latency_msec=90
dxvk_filter_device_name=RTX 3060
dxvk_frame_rate=60

[wine]
fsync=1
esync=1
dll_overrides=dinput=n;dinput8=n;hid=n;hidraw=n

[input]
sdl_joystick_disable=1
sdl_gamecontroller_disable=1
pygame_force_joystick=0
